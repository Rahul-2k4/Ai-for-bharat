Participants will work on real problem statements from government and industry, building AI-powered solutions with the potential for practical deployment and measurable impact.
Top teams will present their solutions at the PAN IIT Summit (https://blr.paniit.org/) on May 16, 2026, in front of industry leaders, policymakers, and technologists.
About the Hackathon
The PAN IIT network brings together leading engineering talent and industry practitioners, and this hackathon reflects that standard through an execution-first approach.
Solutions are expected to go beyond concepts and demonstrate clear usability, feasibility, and relevance to real-world contexts. Teams should design for actual users, workflows, and constraints, using AI where it adds meaningful value.
If it can’t work in the real world, it doesn’t win here.
How It Works
The hackathon begins with a concept phase, followed by a prototype or video and focused build phase, where teams develop solutions for curated problem statements with support from mentors.
Submissions are evaluated based on problem understanding, solution quality, feasibility, and impact, and top teams are shortlisted.
 


 


Open to students &amp; working professionals across India
Team size: 2–5 members
Cross-disciplinary teams (AI/ML + domain expertise) encouraged

xts. Teams should design for actual users, workflows, and constraints, using AI where it adds meaningful value.\r\nIf it can’t work in the real world, it doesn’t win here.\r\nHow It Works\r\nThe hackathon begins with a concept phase, followed by a prototype or video and focused build phase, where teams develop solutions for curated problem statements with support from mentors.\r\nSubmissions are evaluated based on problem understanding, solution quality, feasibility, and impact, and top teams are shortlisted.\r\n \r\n\r\n\r\n \r\n\r\n\r\nOpen to students \u0026 working professionals across India\r\nTeam size: 2–5 members\r\nCross-disciplinary teams (AI/ML + domain expertise) encouraged\r\nNo prior hackathon experience required"])</script><script>self.__next_f.push([1,"26:T5d9,"])</script><script>self.__next_f.push([1,"AI for Bharat is a hackathon co-presented by the PAN IIT Bangalore Alumni Association and the Government of Karnataka.\r\nParticipants will work on real problem statements from government and industry, building AI-powered solutions with the potential for practical deployment and measurable impact.\r\nTop teams will present their solutions at the PAN IIT Summit (https://blr.paniit.org/) on May 16, 2026, in front of industry leaders, policymakers, and technologists.\r\nAbout the Hackathon\r\nThe PAN IIT network brings together leading engineering talent and industry practitioners, and this hackathon reflects that standard through an execution-first approach.\r\nSolutions are expected to go beyond concepts and demonstrate clear usability, feasibility, and relevance to real-world contexts. Teams should design for actual users, workflows, and constraints, using AI where it adds meaningful value.\r\nIf it can’t work in the real world, it doesn’t win here.\r\nHow It Works\r\nThe hackathon begins with a concept phase, followed by a prototype or video and focused build phase, where teams develop solutions for curated problem statements with support from mentors \nSubmissions are evaluated based on problem understanding, solution quality, feasibility, and impact, and top teams are shortlisted.\r\n \r\n\r\n\r\n \r\n\r\n\r\nOpen to students \u0026 working professionals across India\r\nTeam size: 2–5 members\r\nCross-disciplinary teams (AI/ML + domain expertise) encouraged\r\nNo prior hackathon experience required"])</script><script>self.__next_f.push([1,"3b:T460,"])</script><script>self.__next_f.push([1,"\u003cul\u003e\n\u003cli\u003e\n\u003cp\u003eThis is a team participation hackathon. You can have minimum of 2 and at most \u003cstrong\u003e5\u003c/strong\u003e members in your team.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eYou can either invite your friends to form a team or you can request other teams to add you as a member.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eIt's a physical hackathon, the venue is Taj Yeshwantpur, Bengaluru.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThere are multiple themes of the hackathon, you must submit a hack that is in one of these themes only.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eOnce the hackathon starts, you will get an option to submit your hack, you can submit as many times as you want, the last hack will be considered as the final submission.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eYou are expected to come up with new and innovative ideas, any idea that has been copied from somewhere will be disqualified.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eYour hack must be developed entirely during the Hackathon duration. You may use open source libraries and other freely available systems / services such as Google Maps, Facebook Connect, Twitter feeds etc.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003eThe intellectual property of your code belongs only to your team.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ul\u003e"])</script><script>self.__next_f.push([1,"3c:Tcc3,"])</script><script>self.__next_f.push([1,"\u003col\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDo I need to pay any money to register for the Hackathon?\u003c/strong\u003e\nNo. You do not have to pay anything to anyone to register yourself for any Hackathon on HackerEarth.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDo I need to have any specific qualifications to be a participant for the Hackathon?\u003c/strong\u003e\nIf you love to code, you are more than welcome to participate in the Hackathon.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eHow do I submit what I have made for the Hackathon?\u003c/strong\u003e\nYou have to develop the application on your local system and submit it on HackerEarth in tar/zip file format along with instructions to run the application and source code.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDo we need to have the entire idea fully working?\u003c/strong\u003e\nThe entire idea need not be fully implemented however, the submission should be functional so that it can be reviewed by the judges.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eHow is the environment? Will your environment support any language? Will you provide any IDE and DB for us to work on ideas?\u003c/strong\u003e\nYou have to develop the entire software application on your local system and submit it on HackerEarth in tar/zip file format along with instructions to run the application and source code.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDoes one have to be online and available for the entire duration of the Hackathon?\u003c/strong\u003e\nNo, one does not need to be logged in on HackerEarth or be online for the entire duration. You can develop the application on your local system based on the given themes and then submit it on HackerEarth, on the specific challenge page.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eSince there is no specific technology mentioned, are there any restrictions on using number of pre-built libraries?\u003c/strong\u003e\nThere is no restriction to use any language, technology stack, or libraries. You can use any of them to create the web/mobile application.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eDo I need to give a demo for the product that I have built?\u003c/strong\u003e\nIf you want you can submit a small presentation or video that demos your submission, however it's not mandatory, and only good to have. In case you are one of the winners, you might be invited to demo your application at a physical event, details of which will be shared with sufficient advance notice.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eA fully developed application need to have a solid backend for data storage like SQL, SharePoint etc. since its online, is it accepted to show only the proto type of it?\u003c/strong\u003e\nYes it's absolutely fine to submit just the prototype. If you use any database like MySQL or PostgresSQL you can also submit a database dump along with your submission. However you are allowed to submit just the prototype.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eIf it is a team submission, does that mean all team members will have access to work at the same time?\u003c/strong\u003e\nYes, all team members can login from their account and do application submission on HackerEarth.\u003c/p\u003e\n\u003c/li\u003e\n\u003cli\u003e\n\u003cp\u003e\u003cstrong\u003eWho will own the IP(Intellectual Property) Rights to the product that I have built?\u003c/strong\u003e\nThe developer/developers of the web/mobile application will have all rights and own the IP of the product. However, all code needs to be in public domain (open source) so that it can be evaluated by the judges.\u003c/p\u003e\n\u003c/li\u003e\n\u003c/ol\u003e"])</script><script>self.__next_f.push([1,"3d:Tbfb,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cimg alt=\"\" data-src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_b5ea1ae.png\" height=\"283\" src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_b5ea1ae.png\" width=\"1250\"/\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAI for Bharat \u003c/strong\u003eis a hackathon co-presented by the PAN IIT Bangalore Alumni Association and the Government of Karnataka.\u003c/p\u003e\n\u003cp\u003eParticipants will work on real problem statements from government and industry, building AI-powered solutions with the potential for practical deployment and measurable impact.\u003c/p\u003e\n\u003cp\u003eTop teams will present their solutions at the \u003cstrong\u003e\u003ca href=\"https://blr.paniit.org/\"\u003ePAN IIT Summit\u003c/a\u003e on May 16, 2026\u003c/strong\u003e, in front of industry leaders, policymakers, and technologists.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eAbout the Hackathon\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe PAN IIT network brings together leading engineering talent and industry practitioners, and this hackathon reflects that standard through an execution-first approach.\u003c/p\u003e\n\u003cp\u003eSolutions are expected to go beyond concepts and demonstrate clear usability, feasibility, and relevance to real-world contexts. Teams should design for actual users, workflows, and constraints, using AI where it adds meaningful value.\u003c/p\u003e\n\u003cp\u003eIf it can’t work in the real world, it doesn’t win here.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eHow It Works\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eThe hackathon begins with a concept phase, followed by a prototype or video and focused build phase, where teams develop solutions for curated problem statements with support from mentors.\u003c/p\u003e\n\u003cp\u003eSubmissions are evaluated based on problem understanding, solution quality, feasibility, and impact, and top teams are shortlisted.\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cimg alt=\"\" data-src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_f83d768.png\" height=\"42\" src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_f83d768.png\" width=\"1000\"/\u003e\u003c/p\u003e\n\u003cp\u003e\u003cimg alt=\"\" data-src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_aefe2b2.png\" height=\"1500\" src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_aefe2b2.png\" width=\"800\"/\u003e\u003c/p\u003e\n\u003cp\u003e \u003c/p\u003e\n\u003cp\u003e\u003cimg alt=\"\" data-src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_0a322ec.png\" height=\"42\" src=\"https://uc.hackerearth.com/he-s3-ap-south-1/media/sprint/ai-for-namma-karnataka-hackathon-2/editor/editor_image_2646421_0a322ec.png\" width=\"1000\"/\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOpen to \u003cstrong\u003estudents \u0026amp; working professionals\u003c/strong\u003e across India\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eTeam size:\u003c/strong\u003e 2–5 members\u003c/li\u003e\n\u003cli\u003e\u003cstrong\u003eCross-disciplinary teams\u003c/strong\u003e (AI/ML + domain expertise) encouraged\u003c/li\u003e\n\u003cli\u003eNo prior hackathon experience required\u003c/li\u003e\n\u003c/ul\u003e"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"div\",null,{\"className\":\"flex flex-col w-full
